name: Daily Jokes Bot
on:
  schedule:
    - cron: '30 2,7,12,17,22 * * *'
  workflow_dispatch:

jobs:
  fetch_joke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Get a Random Joke
        run: |
          export TZ='Asia/Dhaka'
          echo "--- Joke of the Moment: $(date) ---" >> jokes.txt
          curl -s "https://icanhazdadjoke.com/" -H "Accept: text/plain" >> jokes.txt
          echo -e "\n------------------------------------------\n" >> jokes.txt
          
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Jokes-Bot"
          git add jokes.txt
          git commit -m "Joke Sync: $(export TZ='Asia/Dhaka'; date)"
          git push
